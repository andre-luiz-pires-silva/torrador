<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Configurações</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="wrap">
    <div class="topbar start">
      <a class="iconbtn" href="/" aria-label="Voltar" title="Início" style="margin-left:-.5rem">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </a>
      <h1>Configurações</h1>
    </div>

    <div class="tabs" role="tablist">
      <button class="tab" id="tab-op"  role="tab" aria-selected="true"  aria-controls="panel-op">Operação</button>
      <button class="tab" id="tab-net" role="tab" aria-selected="false" aria-controls="panel-net">Rede</button>
    </div>

    <!-- ===================== OPERAÇÃO ===================== -->
    <section class="section" id="panel-op" role="tabpanel" aria-labelledby="tab-op">
      <form class="form" id="form-op">
        <div class="field">
          <label>Modo de controle</label>
          <div class="seg" id="ctrlmode">
            <label><input type="radio" name="mode" value="manual"><span>Manual</span></label>
            <label><input type="radio" name="mode" value="auto"><span>Automático</span></label>
            <label><input type="radio" name="mode" value="artisan"><span>Artisan</span></label>
          </div>
          <p class="hint" id="ctrl-hint"></p>
        </div>

        <div class="field" id="op-auto" hidden>
          <label>Banda de temperatura (BT)</label>
          <div class="row2">
            <input id="min" name="min" type="number" inputmode="decimal" step="1" placeholder="Mín °C">
            <input id="max" name="max" type="number" inputmode="decimal" step="1" placeholder="Máx °C">
          </div>
          <p class="hint">Deixe em branco para o queimador seguir direto o Iniciar/Parar.</p>
        </div>

        <button type="submit" class="btn block ember" id="save-op">Salvar</button>
        <p class="status" id="op-status"></p>
      </form>
    </section>

    <!-- ===================== REDE ===================== -->
    <section class="section" id="panel-net" role="tabpanel" aria-labelledby="tab-net" hidden>
      <form class="form" id="form-net">
        <div class="field">
          <label>Modo de rede</label>
          <div class="seg" id="netmode">
            <label><input type="radio" name="mode" value="ap"><span>Rede do Torrador</span></label>
            <label><input type="radio" name="mode" value="sta"><span>Rede existente</span></label>
          </div>
          <p class="hint" id="net-hint"></p>
        </div>

        <!-- AP -->
        <div class="field" id="sec-ap">
          <label for="ap_password">Senha do ponto de acesso</label>
          <input id="ap_password" name="ap_password" type="text" autocomplete="off"
                 placeholder="mínimo 8 caracteres">
        </div>

        <!-- STA -->
        <div id="sec-sta" class="form">
          <div class="row-scan">
            <div class="field">
              <label for="ssid">Rede (SSID)</label>
              <input id="ssid" name="ssid" autocomplete="off" placeholder="Nome da rede">
            </div>
            <button type="button" id="scan" class="btn ghost small">Procurar</button>
          </div>
          <div id="networks" class="netlist"></div>
          <div class="field">
            <label for="password">Senha da rede</label>
            <input id="password" name="password" type="password" autocomplete="off"
                   placeholder="Senha da rede Wi-Fi">
          </div>
        </div>

        <div class="field">
          <label for="mdns">Nome na rede (mDNS)</label>
          <input id="mdns" name="mdns" autocomplete="off" placeholder="ex.: torrador">
        </div>

        <button type="submit" class="btn block ember" id="save-net">Salvar e reiniciar</button>
        <p class="status" id="net-status"></p>
      </form>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));
    let brandName = 'torrador';
    let apSsid = 'Torrador';

    /* ---------- Tabs ---------- */
    function selectTab(which) {
      const op = which === 'op';
      $('tab-op').setAttribute('aria-selected', op);
      $('tab-net').setAttribute('aria-selected', !op);
      $('panel-op').hidden = !op;
      $('panel-net').hidden = op;
    }
    $('tab-op').addEventListener('click', () => selectTab('op'));
    $('tab-net').addEventListener('click', () => selectTab('net'));

    /* ---------- Operation: control-mode hint ---------- */
    const CTRL_HINTS = {
      manual:  'O operador liga e desliga o queimador com Iniciar/Parar.',
      auto:    'O queimador regula sozinho pela banda de temperatura abaixo.',
      artisan: 'Controlado pelo software Artisan via MODBUS (fase 3).',
    };
    function ctrlChanged() {
      const sel = document.querySelector('#ctrlmode input:checked');
      const v = sel ? sel.value : 'manual';
      $('ctrl-hint').textContent = CTRL_HINTS[v] || '';
      // Mode-specific fields: the band belongs to Automático. Other modes get
      // their own sections here as they are developed.
      $('op-auto').hidden = (v !== 'auto');
    }
    document.querySelectorAll('#ctrlmode input').forEach(r =>
      r.addEventListener('change', ctrlChanged));

    /* ---------- Network: mode toggle ---------- */
    function setNetMode(mode) {
      const ap = mode !== 'sta';
      $('netmode').querySelector('input[value="ap"]').checked = ap;
      $('netmode').querySelector('input[value="sta"]').checked = !ap;
      $('sec-ap').hidden = !ap;
      $('sec-sta').hidden = ap;
      $('net-hint').textContent = ap
        ? 'O ' + brandName + ' cria a própria rede Wi-Fi (' + apSsid + '). Conecte seu '
          + 'celular ou computador nela para operar — não precisa de internet no local.'
        : 'O ' + brandName + ' se conecta a uma rede Wi-Fi existente.';
    }
    document.querySelectorAll('#netmode input').forEach(r =>
      r.addEventListener('change', () => setNetMode(r.value)));

    /* ---------- Load current config ---------- */
    fetch('/config').then(r => r.json()).then(c => {
      if (!c) return;
      if (c.name) { brandName = c.name; }
      const op = c.operation || {};
      const on = c.network || {};
      if (on.ap_ssid) apSsid = on.ap_ssid;

      // operation
      const cm = document.querySelector('#ctrlmode input[value="' + (op.mode || 'manual') + '"]');
      if (cm) cm.checked = true;
      if (op.min_c !== null && op.min_c !== undefined) $('min').value = op.min_c;
      if (op.max_c !== null && op.max_c !== undefined) $('max').value = op.max_c;
      ctrlChanged();

      // network
      if (on.ap_password) $('ap_password').value = on.ap_password;
      if (on.mdns) $('mdns').value = on.mdns;
      if (on.ssid) $('ssid').value = on.ssid;
      setNetMode(on.mode || 'ap');
    }).catch(() => setNetMode('ap'));

    /* ---------- Wi-Fi scan ---------- */
    function wifiIcon(rssi) {
      const level = rssi >= -60 ? 3 : rssi >= -70 ? 2 : rssi >= -78 ? 1 : 0;
      const on = '#2563eb', off = '#cbd5e1';
      const c = (n) => level >= n ? on : off;
      return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none">'
        + '<path d="M3.5 9.5a12 12 0 0 1 17 0" stroke="' + c(3) + '" stroke-width="2" stroke-linecap="round"/>'
        + '<path d="M6.5 12.7a8 8 0 0 1 11 0" stroke="' + c(2) + '" stroke-width="2" stroke-linecap="round"/>'
        + '<path d="M9.3 15.7a4 4 0 0 1 5.4 0" stroke="' + c(1) + '" stroke-width="2" stroke-linecap="round"/>'
        + '<circle cx="12" cy="18.6" r="1.4" fill="#2563eb"/></svg>';
    }
    function renderNets(nets) {
      const box = $('networks'); box.innerHTML = '';
      nets.forEach(n => {
        const row = document.createElement('button');
        row.type = 'button'; row.className = 'net';
        const name = document.createElement('span');
        name.className = 'name'; name.textContent = n.ssid;
        const meta = document.createElement('span');
        meta.className = 'meta';
        meta.innerHTML = (n.enc ? '🔒' : '') + wifiIcon(n.rssi);
        row.append(name, meta);
        row.addEventListener('click', () => {
          $('ssid').value = n.ssid;
          document.querySelectorAll('.net.sel').forEach(e => e.classList.remove('sel'));
          row.classList.add('sel');
          $('password').focus();
        });
        box.appendChild(row);
      });
    }
    const netStatus = $('net-status');
    $('scan').addEventListener('click', async () => {
      const btn = $('scan'); btn.disabled = true; btn.textContent = '…';
      netStatus.className = 'status'; netStatus.textContent = 'Procurando redes…';
      try {
        let data;
        for (let i = 0; i < 15; i++) {
          data = await (await fetch('/scan')).json();
          if (!data.scanning) break;
          await sleep(1000);
        }
        if (!data || data.scanning) throw new Error('timeout');
        const seen = new Set();
        const nets = (data.networks || [])
          .filter(n => n.ssid)
          .sort((a, b) => b.rssi - a.rssi)
          .filter(n => !seen.has(n.ssid) && seen.add(n.ssid));
        renderNets(nets);
        netStatus.textContent = nets.length
          ? nets.length + ' rede(s) encontrada(s). Toque para selecionar.'
          : 'Nenhuma rede encontrada.';
      } catch (e) {
        netStatus.className = 'status err'; netStatus.textContent = 'Falha ao procurar redes.';
      } finally {
        btn.disabled = false; btn.textContent = 'Procurar';
      }
    });

    /* ---------- Save: operation (applies live, no reboot) ---------- */
    const opStatus = $('op-status');
    $('form-op').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const mode = document.querySelector('#ctrlmode input:checked').value;
      const min = $('min').value.trim(), max = $('max').value.trim();
      if (mode === 'auto' && (min === '' || max === '')) {
        opStatus.className = 'status err';
        opStatus.textContent = 'No modo Automático, defina a faixa mínima e máxima.';
        return;
      }
      if (min !== '' && max !== '' && parseFloat(min) >= parseFloat(max)) {
        opStatus.className = 'status err';
        opStatus.textContent = 'A mínima precisa ser menor que a máxima.';
        return;
      }
      const btn = $('save-op'); btn.disabled = true;
      opStatus.className = 'status'; opStatus.textContent = 'Salvando…';
      try {
        const body = new URLSearchParams(new FormData($('form-op')));
        const res = await (await fetch('/operation', { method: 'POST', body })).json();
        if (!res || !res.ok) throw new Error(res && res.error);
        location.href = '/';                       // back to home after saving
      } catch (e) {
        opStatus.className = 'status err'; opStatus.textContent = 'Falha ao salvar. Tente novamente.';
        btn.disabled = false;
      }
    });

    /* ---------- Save: network (reboots to apply) ---------- */
    $('form-net').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const mode = $('netmode').querySelector('input:checked').value;
      if ($('ap_password').value.length < 8) {
        setNetMode('ap'); $('ap_password').focus();
        netStatus.className = 'status err';
        netStatus.textContent = 'A senha do ponto de acesso precisa de ao menos 8 caracteres.';
        return;
      }
      if (mode === 'sta' && !$('ssid').value.trim()) {
        $('ssid').focus();
        netStatus.className = 'status err';
        netStatus.textContent = 'Informe a rede (SSID) para conectar.';
        return;
      }
      const btn = $('save-net'); btn.disabled = true;
      netStatus.className = 'status'; netStatus.textContent = 'Salvando…';
      try {
        const body = new URLSearchParams(new FormData($('form-net')));
        const res = await (await fetch('/save', { method: 'POST', body })).json();
        if (!res || !res.ok) {
          netStatus.className = 'status err';
          netStatus.textContent = res && res.error === 'ap_pw'
            ? 'A senha do ponto de acesso precisa de ao menos 8 caracteres.'
            : 'Falha ao salvar. Tente novamente.';
          btn.disabled = false;
          return;
        }
        netStatus.className = 'status ok';
        const mdns = ($('mdns').value.trim() || 'torrador') + '.local';
        netStatus.textContent = mode === 'sta'
          ? 'Salvo! O ' + brandName + ' vai reiniciar e conectar-se a "' + $('ssid').value
            + '". Depois acesse http://' + mdns + ' nessa rede.'
          : 'Salvo! O ' + brandName + ' vai reiniciar. Reconecte-se à rede "' + apSsid
            + '" com a nova senha.';
      } catch (e) {
        netStatus.className = 'status err';
        netStatus.textContent = 'Falha ao salvar. Tente novamente.';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
