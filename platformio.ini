; PlatformIO project configuration — Coffee Roaster Controller (torrador)
;
;   pio run                          build
;   pio run -t upload -t monitor     flash firmware + serial monitor
;   pio run -t buildfs               build the LittleFS image (data/)
;   pio run -t uploadfs              flash the LittleFS image
;
; Firmware and filesystem (data/) are flashed separately.

[platformio]
default_envs = esp32

; ---- ESP32-WROOM: target board ------------------------------------------
[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Web UI (data/), persisted rules and config.json live on LittleFS.
board_build.filesystem = littlefs
; Pre-provisioning: drop a data/config.json before `uploadfs` and it is written
; to /config.json on the device and loaded at boot (Wi-Fi, mode, etc.) — handy
; because uploadfs wipes the partition. That file is gitignored (holds the Wi-Fi
; password); copy config.example.json to data/config.json to start.
; Async web server stack (maintained ESP32Async fork).
lib_deps =
    ESP32Async/ESPAsyncWebServer
    ESP32Async/AsyncTCP
    olikraus/U8g2
    bblanchon/ArduinoJson@^7
    ; MODBUS TCP slave for Artisan (Phase 2). Async server rides the same AsyncTCP
    ; stack as the web server — no extra FreeRTOS task, no loop pump.
    miq19/eModbus
