<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Torrador</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <div class="brand">
        <span class="mark" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M13 2c-1.6 2.3-2.2 4-1 6 .9 1.5.6 2.8-.4 3.7.3-1.6-.5-2.5-1.2-3-.2 2-1.6 3-2.6 4.4C6.6 14.7 6 16.2 6 18a6 6 0 0 0 12 0c0-3.2-1.8-5.6-3.4-7.6C13 8.4 12.3 6 13 2z"/>
          </svg>
        </span>
        <span class="name" id="brand">Torrador</span>
      </div>
      <a class="iconbtn" href="/settings" aria-label="Configurações" title="Configurações">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </a>
    </div>

    <div class="readout">
      <div class="pillrow">
        <span class="pill" id="mode">—</span>
        <span class="pill soft" id="net">—</span>
      </div>
      <div>
        <span class="eyebrow">Temperatura do grão · BT</span>
        <div class="hero"><span class="val" id="temp">--</span><span class="unit">°C</span></div>
      </div>
      <div class="chip" id="state"><span class="dot"></span><span id="stateLabel">—</span></div>
      <p class="hint" id="band" hidden>Faixa: — / —</p>
    </div>

    <div class="actions">
      <button id="startstop" class="btn block primary">—</button>
      <button id="clear" class="btn block ghost" hidden>Destravar</button>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    const MODES = { manual: 'Manual', auto: 'Automático', artisan: 'Artisan' };
    const STATES = {
      IDLE:    { label: 'Parado',                color: '#78716c' },
      RUN:     { label: 'Aquecendo',             color: '#d97706' },
      HOLD:    { label: 'Temperatura OK',         color: '#15803d' },
      LOCKOUT: { label: 'Falha — destrave',       color: '#b91c1c' },
      ESTOP:   { label: 'Emergência — destrave',  color: '#b91c1c' },
      FAULT:   { label: 'Falha no sensor BT',     color: '#b91c1c' },
    };
    const fmt = (v) => (v === null || v === undefined) ? '—' : (v + '°');

    fetch('/brand').then(r => r.json()).then(b => {
      if (b && b.name) { document.title = b.name; $('brand').textContent = b.name; }
    }).catch(() => {});

    async function poll() {
      try {
        const s = await (await fetch('/status')).json();
        $('mode').textContent = MODES[s.mode] || s.mode;
        $('net').textContent = s.net || '—';
        $('temp').textContent = (s.temp_c === null || s.temp_c === undefined)
          ? '--' : s.temp_c.toFixed(1);

        const st = STATES[s.state] || { label: s.state, color: '#78716c' };
        $('state').style.color = st.color;
        $('stateLabel').textContent = st.label;

        // Faixa only matters in Automático.
        $('band').hidden = (s.mode !== 'auto');
        $('band').textContent = 'Faixa: ' + fmt(s.min_c) + ' / ' + fmt(s.max_c);

        const ss = $('startstop');
        if (s.mode === 'artisan') {
          ss.textContent = 'Parada de emergência';
          ss.className = 'btn block danger';
        } else {
          ss.textContent = s.process_on ? 'Parar' : 'Iniciar';
          ss.className = 'btn block ' + (s.process_on ? 'danger' : 'primary');
        }
        $('clear').hidden = !(s.state === 'LOCKOUT' || s.state === 'ESTOP');
      } catch (e) { /* transient — keep last values */ }
    }

    async function cmd(c) {
      try {
        await fetch('/command', { method: 'POST', body: new URLSearchParams({ cmd: c }) });
        await poll();
      } catch (e) { /* ignore */ }
    }
    $('startstop').addEventListener('click', () => cmd('startstop'));
    $('clear').addEventListener('click', () => cmd('clear'));

    poll();
    setInterval(poll, 1000);
  </script>
</body>
</html>
