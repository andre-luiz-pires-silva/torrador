<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Torrador</title>
  <!-- bump ?v= sempre que style.css mudar (invalida o cache longo do navegador) -->
  <link rel="stylesheet" href="/style.css?v=5">
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <div class="brand">
        <span class="mark" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M13 2c-1.6 2.3-2.2 4-1 6 .9 1.5.6 2.8-.4 3.7.3-1.6-.5-2.5-1.2-3-.2 2-1.6 3-2.6 4.4C6.6 14.7 6 16.2 6 18a6 6 0 0 0 12 0c0-3.2-1.8-5.6-3.4-7.6C13 8.4 12.3 6 13 2z"/>
          </svg>
        </span>
        <span class="name" id="brand">Torrador</span>
      </div>
      <a class="iconbtn" id="cfgLink" href="/settings" aria-label="Configurações" title="Configurações">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </a>
    </div>

    <!-- Banner de indisponibilidade: fica fora do .readout para não esmaecer junto. -->
    <div class="offbar" id="offlineBanner" role="status" aria-live="polite" hidden>
      <span class="offbar-ico" id="offIco" aria-hidden="true"></span>
      <div class="offbar-txt">
        <b>Sem conexão com o equipamento</b>
        <span>Tentando reconectar…</span>
      </div>
      <span class="offbar-dot" aria-hidden="true"></span>
    </div>

    <div class="readout">
      <div class="strip">
        <div class="stat">
          <span class="stat-label">Controle</span>
          <span class="stat-val"><span class="ico" id="modeIco"></span><span class="txt" id="mode">—</span></span>
        </div>
        <div class="stat">
          <span class="stat-label" id="netLabel">Rede</span>
          <span class="stat-val"><span class="ico" id="netIco"></span><span class="txt" id="net">—</span></span>
        </div>
      </div>
      <div>
        <span class="eyebrow">Temperatura do grão · BT</span>
        <div class="hero"><span class="val" id="bt">--</span><span class="unit">°C</span></div>
        <!-- Faixa de controle: pertence ao BT, então vive colada a ele (só em Automático). -->
        <div class="range heat" id="band" hidden>
          <div class="range-head">
            <span class="range-lbl">Faixa de controle</span>
            <span class="range-now" id="bandNow">—</span>
          </div>
          <div class="range-track">
            <div class="range-fill" id="bandFill"></div>
            <div class="range-marker" id="bandMarker"></div>
          </div>
          <div class="range-ends">
            <span>mín <b id="bandMin">—</b></span>
            <span>máx <b id="bandMax">—</b></span>
          </div>
        </div>
        <!-- Comando do Artisan: só no modo Artisan; ocupa o mesmo lugar da faixa.
             Mostra o vínculo com o Artisan e a potência que ele está pedindo. -->
        <div class="range" id="artisan" hidden>
          <div class="range-head">
            <span class="range-lbl">Comando do Artisan</span>
            <span class="range-now" id="artPow">—</span>
          </div>
          <div class="range-track">
            <div class="range-fill" id="artFill"></div>
            <div class="range-marker" id="artThr"></div>
          </div>
          <div class="range-ends">
            <span id="artLink">—</span>
            <span>aciona acima de <b id="artThrLbl">—</b></span>
          </div>
        </div>
      </div>
      <div>
        <span class="eyebrow">Temperatura do ar · ET</span>
        <div class="hero small"><span class="val" id="et">--</span><span class="unit">°C</span></div>
      </div>
      <div class="chip" id="state"><span class="dot"></span><span id="stateLabel">—</span></div>
    </div>

    <div class="actions">
      <button id="startstop" class="btn block primary">—</button>
      <button id="clear" class="btn block ghost" hidden>Destravar</button>
    </div>

    <!-- Monitor de recursos: discreto, sem cor, só saúde do equipamento.
         Cada indicador leva um ícone de traço fino + o valor. -->
    <footer class="diag" id="diag" hidden>
      <span title="Memória RAM livre"><i class="di" id="icoRam"></i><b id="diagHeap">—</b></span>
      <span title="Iterações do laço por segundo (folga de CPU)"><i class="di" id="icoCpu"></i><b id="diagLoop">—</b></span>
      <span title="Intensidade do sinal Wi-Fi" id="rssiWrap" hidden><i class="di" id="icoWifi"></i><b id="diagRssi">—</b></span>
      <span title="Tempo ligado"><i class="di" id="icoUp"></i><b id="diagUp">—</b></span>
    </footer>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    // Uptime compacto: 45s · 12min · 3h 20m · 2d 4h
    const fmtUptime = (s) => {
      if (s < 60) return `${s}s`;
      const m = Math.floor(s / 60);
      if (m < 60) return `${m}min`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ${m % 60}m`;
      return `${Math.floor(h / 24)}d ${h % 24}h`;
    };

    const MODES = { manual: 'Manual', auto: 'Automático', artisan: 'Artisan' };

    // Inline stroke icons (match the product's gear/wifi style). Injected by mode/net.
    const SVG = (p) => '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" '
      + 'stroke-linecap="round" stroke-linejoin="round">' + p + '</svg>';
    const MODE_ICON = {
      manual:  SVG('<circle cx="12" cy="8" r="3.2"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/>'),
      auto:    SVG('<path d="M20 12a8 8 0 1 1-2.34-5.66"/><path d="M20 4v4h-4"/>'),
      artisan: SVG('<path d="M4 4v16h16"/><path d="M7 15l3.5-4 3 2.2L20 7"/>'),
    };
    const ICON_AP  = SVG('<circle cx="12" cy="12" r="2.2"/><path d="M8.2 8.2a5.4 5.4 0 0 0 0 7.6"/>'
      + '<path d="M15.8 8.2a5.4 5.4 0 0 1 0 7.6"/><path d="M5.6 5.6a9 9 0 0 0 0 12.8"/>'
      + '<path d="M18.4 5.6a9 9 0 0 1 0 12.8"/>');
    const ICON_STA = SVG('<path d="M4.5 9.5a11 11 0 0 1 15 0"/><path d="M7.5 12.8a7 7 0 0 1 9 0"/>'
      + '<path d="M10.5 16a3 3 0 0 1 3 0"/><circle cx="12" cy="18.8" r="1" fill="currentColor" stroke="none"/>');
    const STATES = {
      IDLE:    { label: 'Parado',                color: '#78716c' },
      RUN:     { label: 'Aquecendo',             color: '#d97706' },
      HOLD:    { label: 'Temperatura OK',         color: '#15803d' },
      LOCKOUT: { label: 'Falha — destrave',       color: '#b91c1c' },
      ESTOP:   { label: 'Emergência — destrave',  color: '#b91c1c' },
      FAULT:   { label: 'Falha no sensor BT',     color: '#b91c1c' },
    };

    fetch('/brand').then(r => r.json()).then(b => {
      if (b && b.name) { document.title = b.name; $('brand').textContent = b.name; }
    }).catch(() => {});

    // Wi-Fi RSSI (dBm) -> porcentagem. -100 dBm ≈ 0%, -50 dBm ≈ 100%.
    const rssiPct = (dbm) => Math.max(0, Math.min(100, Math.round(2 * (dbm + 100))));

    // Ícones do monitor (mesmo traço fino da UI), injetados uma vez.
    $('icoRam').innerHTML  = SVG('<rect x="6" y="8" width="12" height="8" rx="1"/>'
      + '<path d="M9 8V6M12 8V6M15 8V6M9 18v-2M12 18v-2M15 18v-2"/>');            // chip de memória
    $('icoCpu').innerHTML  = SVG('<path d="M3 12h4l2 5 4-11 2 6h6"/>');            // pulso (atividade)
    $('icoWifi').innerHTML = SVG('<path d="M5 9.5a11 11 0 0 1 14 0"/>'
      + '<path d="M8 12.6a7 7 0 0 1 8 0"/><path d="M10.7 15.6a3 3 0 0 1 2.6 0"/>'
      + '<circle cx="12" cy="18.4" r=".7" fill="currentColor" stroke="none"/>');  // sinal wi-fi
    $('icoUp').innerHTML   = SVG('<circle cx="12" cy="12" r="8"/><path d="M12 8v4l2.5 2"/>'); // relógio
    // Wi-fi cortado (banner offline): sinal + barra diagonal.
    $('offIco').innerHTML  = SVG('<path d="M5 9.5a11 11 0 0 1 14 0"/>'
      + '<path d="M8 12.6a7 7 0 0 1 8 0"/><path d="M10.7 15.6a3 3 0 0 1 2.6 0"/>'
      + '<circle cx="12" cy="18.4" r=".7" fill="currentColor" stroke="none"/>'
      + '<path d="M3 3l18 18"/>');

    // Sinaliza indisponibilidade do equipamento: esmaece as leituras (marcando-as
    // como não-atuais), mostra o banner de reconexão e desabilita os comandos.
    function setOffline(on) {
      if (document.body.classList.contains('offline') === on) return; // já no estado
      document.body.classList.toggle('offline', on);
      $('offlineBanner').hidden = !on;
      $('startstop').disabled = on;   // não dá para comandar um equipamento offline
      $('clear').disabled = on;
      // A engrenagem é um link: navegar até /settings offline não carrega, então
      // bloqueamos clique (CSS) e foco por teclado, e sinalizamos via aria.
      const cfg = $('cfgLink');
      cfg.setAttribute('aria-disabled', on ? 'true' : 'false');
      cfg.tabIndex = on ? -1 : 0;
    }

    // Guard contra requests empilhadas: com o ESP desligado o fetch fica pendurado
    // até o timeout, então nunca deixamos uma nova poll começar antes da anterior.
    let inFlight = false;
    // Duas falhas seguidas (~2–3 s) antes de declarar offline — uma request perdida
    // isolada não deve piscar a interface.
    let misses = 0;

    async function poll() {
      if (inFlight) return;
      inFlight = true;
      try {
        // Timeout próprio: um host morto não rejeita o fetch rápido (o socket
        // pendura por dezenas de segundos), então abortamos em 2,5 s.
        const ac = new AbortController();
        const t = setTimeout(() => ac.abort(), 2500);
        let s;
        try {
          const r = await fetch('/status', { signal: ac.signal });
          if (!r.ok) throw new Error('http ' + r.status);
          s = await r.json();
        } finally {
          clearTimeout(t);
        }
        misses = 0;
        setOffline(false);
        $('mode').textContent = MODES[s.mode] || s.mode;
        $('modeIco').innerHTML = MODE_ICON[s.mode] || '';
        // Rede: rótulo humano ("Rede própria" p/ AP, "Conectado" p/ STA) + nome (SSID).
        const ap = s.net === 'AP';
        $('netLabel').textContent = ap ? 'Rede própria' : 'Conectado';
        $('netIco').innerHTML = ap ? ICON_AP : ICON_STA;
        $('net').textContent = s.ssid || '—';
        const temp = (v) => (v === null || v === undefined) ? '--' : v.toFixed(1);
        $('bt').textContent = temp(s.bt_c);
        $('et').textContent = temp(s.et_c);

        const st = STATES[s.state] || { label: s.state, color: '#78716c' };
        $('state').style.color = st.color;
        $('stateLabel').textContent = st.label;

        // Faixa de controle — só em Automático; mostra onde o BT está entre mín e máx.
        const band = $('band');
        if (s.mode === 'auto' && s.min_c != null && s.max_c != null) {
          band.hidden = false;
          $('bandMin').textContent = s.min_c + '°';
          $('bandMax').textContent = s.max_c + '°';
          const span = s.max_c - s.min_c;
          let pct = (s.bt_c == null || span <= 0) ? 0 : ((s.bt_c - s.min_c) / span) * 100;
          pct = Math.max(0, Math.min(100, pct));
          $('bandFill').style.width = pct + '%';
          $('bandMarker').style.left = pct + '%';
          // Satisfeito (verde) quando o processo segura a temperatura (HOLD) ou BT ≥ máx;
          // caso contrário está aquecendo (ember).
          const satisfied = s.state === 'HOLD' || (s.bt_c != null && s.bt_c >= s.max_c);
          band.className = 'range ' + (satisfied ? 'ok' : 'heat');
          $('bandNow').textContent = s.bt_c == null ? '—'
            : (s.bt_c < s.min_c ? 'abaixo' : s.bt_c >= s.max_c ? 'no topo' : 'dentro');
        } else {
          band.hidden = true;
        }

        // Comando do Artisan — só no modo Artisan: vínculo (atividade recente do
        // Artisan) + potência pedida, com o limiar de acionamento marcado no medidor.
        const artisan = $('artisan');
        if (s.mode === 'artisan') {
          artisan.hidden = false;
          const linked = !!s.artisan_linked;
          const thr = s.artisan_threshold || 0;
          const pow = linked ? (s.artisan_power || 0) : null;   // sem vínculo, potência é irrelevante
          $('artLink').textContent = linked ? '● conectado' : '● sem conexão';
          $('artLink').style.color = linked ? '#166534' : '#b91c1c';
          $('artPow').textContent = pow == null ? '—' : pow + '%';
          $('artThrLbl').textContent = thr + '%';
          $('artFill').style.width = (pow == null ? 0 : pow) + '%';
          $('artThr').style.left = thr + '%';
          const heating = pow != null && pow > thr;
          artisan.className = 'range ' + (heating ? 'heat' : 'off');
        } else {
          artisan.hidden = true;
        }

        const ss = $('startstop');
        const latched = (s.state === 'LOCKOUT' || s.state === 'ESTOP');
        if (s.mode === 'artisan') {
          // O botão é a parada de emergência; uma vez travado, ele próprio vira a
          // ação de destravar (sem botão extra) — como Iniciar/Parar no manual.
          if (latched) {
            ss.textContent = 'Destravar';
            ss.className = 'btn block ghost';
            ss.dataset.cmd = 'clear';
          } else {
            ss.textContent = 'Parada de emergência';
            ss.className = 'btn block danger';
            ss.dataset.cmd = 'startstop';
          }
          $('clear').hidden = true;   // no Artisan, o mesmo botão faz as duas ações
        } else {
          ss.textContent = s.process_on ? 'Parar' : 'Iniciar';
          ss.className = 'btn block ' + (s.process_on ? 'danger' : 'primary');
          ss.dataset.cmd = 'startstop';
          $('clear').hidden = !latched;
        }

        // Monitor de recursos (rodapé). Só leituras baratas vindas do firmware.
        const d = s.diag;
        if (d) {
          const pct = d.heap_size ? Math.round((d.free_heap / d.heap_size) * 100) : 0;
          $('diagHeap').textContent = `${pct}%`;
          const lps = d.lps >= 1000 ? Math.round(d.lps / 1000) + 'k' : d.lps;
          $('diagLoop').textContent = `${lps}`;
          if (d.rssi) { $('rssiWrap').hidden = false; $('diagRssi').textContent = `${rssiPct(d.rssi)}%`; }
          else { $('rssiWrap').hidden = true; }
          $('diagUp').textContent = fmtUptime(d.uptime_s);
          $('diag').hidden = false;
        }
      } catch (e) {
        // Falha de conexão: após 2 seguidas, entra em modo offline (leituras
        // esmaecidas + banner). A poll continua rodando e recupera sozinha.
        if (++misses >= 2) setOffline(true);
      } finally {
        inFlight = false;
      }
    }

    async function cmd(c) {
      try {
        await fetch('/command', { method: 'POST', body: new URLSearchParams({ cmd: c }) });
        await poll();
      } catch (e) { /* ignore */ }
    }
    $('startstop').addEventListener('click', () => cmd($('startstop').dataset.cmd || 'startstop'));
    $('clear').addEventListener('click', () => cmd('clear'));

    poll();
    setInterval(poll, 1000);
  </script>
</body>
</html>
